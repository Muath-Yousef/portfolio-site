name: Basic Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          strict: false
          file_or_dir: .

      - name: Verify repository is readable
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -d .github
